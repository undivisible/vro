name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Build V from source
        shell: bash
        run: |
          set -euo pipefail
          git clone --depth 1 https://github.com/vlang/v.git "${HOME}/vlang"
          cd "${HOME}/vlang"
          make
          "${HOME}/vlang/v" version

      - name: Verify vfmt
        shell: bash
        run: |
          set -euo pipefail
          V="${HOME}/vlang/v"
          cd "${GITHUB_WORKSPACE}"
          "${V}" fmt -verify main.v input.v syntax.v syntax_test.v

      - name: Check, test, and build vro
        shell: bash
        run: |
          set -euo pipefail
          V="${HOME}/vlang/v"
          "${V}" -gc none -check .
          "${V}" -gc none test .
          "${V}" -gc none -prod -o vro .
          test -x ./vro
          ./vro -version
          ./vro --help >/dev/null
