name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            asset_suffix: macos-aarch64
            ext: tar.gz
            bin: vro
          - os: ubuntu-latest
            asset_suffix: linux-x86_64
            ext: tar.gz
            bin: vro
          - os: ubuntu-24.04-arm
            asset_suffix: linux-aarch64
            ext: tar.gz
            bin: vro
          - os: windows-latest
            asset_suffix: windows-x86_64
            ext: zip
            bin: vro.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Build V from source (unix)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          set -euo pipefail
          git clone --depth 1 https://github.com/vlang/v.git "${HOME}/vlang"
          cd "${HOME}/vlang"
          make
          echo "V=${HOME}/vlang/v" >> "${GITHUB_ENV}"

      - name: Build V from source (windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${HOME}/vlang"
          curl -fsSL "https://github.com/vlang/v/releases/download/0.5.1/v_windows.zip" -o /tmp/v.zip
          unzip -q /tmp/v.zip -d "${HOME}/vlang"
          echo "V=${HOME}/vlang/v.exe" >> "${GITHUB_ENV}"

      - name: Verify vfmt
        shell: bash
        run: |
          set -euo pipefail
          cd "${GITHUB_WORKSPACE}"
          "${V}" fmt -verify main.v input.v syntax.v syntax_test.v

      - name: Build vro
        shell: bash
        run: |
          set -euo pipefail
          "${V}" -gc none -check .
          "${V}" -gc none test .
          "${V}" -gc none -prod -o ${{ matrix.bin }} .

      - name: Verify binary
        shell: bash
        run: |
          set -euo pipefail
          test -x ./${{ matrix.bin }} || test -f ./${{ matrix.bin }}
          ./${{ matrix.bin }} -version
          ./${{ matrix.bin }} --help >/dev/null

      - name: Package (tar.gz)
        if: matrix.ext == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp ${{ matrix.bin }} "dist/${{ matrix.bin }}"
          cp -R syntax "dist/syntax"
          (cd dist && tar -czf "vro-${{ matrix.asset_suffix }}.tar.gz" ${{ matrix.bin }} syntax)
          (cd dist && shasum -a 256 "vro-${{ matrix.asset_suffix }}.tar.gz" > "vro-${{ matrix.asset_suffix }}.sha256")

      - name: Package (zip)
        if: matrix.ext == 'zip'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp ${{ matrix.bin }} "dist/${{ matrix.bin }}"
          cp -R syntax "dist/syntax"
          (cd dist && zip -r "vro-${{ matrix.asset_suffix }}.zip" ${{ matrix.bin }} syntax)
          (cd dist && shasum -a 256 "vro-${{ matrix.asset_suffix }}.zip" > "vro-${{ matrix.asset_suffix }}.sha256")

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.asset_suffix }}
          path: dist/*

  publish:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
