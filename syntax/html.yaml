# vro subset — HTML-ish highlighting (V regex; not PCRE).
filetype: html

detect:
  filename: "\\.(html|htm)$"

rules:
  - comment:
      start: "<!--"
      end: "-->"

  - constant.string:
      start: "\""
      end: "\""
      skip: "\\\\."

  - constant.string:
      start: "'"
      end: "'"
      skip: "\\\\."

  - keyword: "</?[a-zA-Z][a-zA-Z0-9:-]*"
  - symbol.brackets: "(\\{|\\}|\\(|\\)|\\[|\\])"
  - constant.number: "(#[0-9a-fA-F]{3,8}\\b)"
