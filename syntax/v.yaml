# vro subset: patterns use V's regex engine (not PCRE). See README.
filetype: v

detect:
  filename: "\\.(v|vv|vsh)$"

rules:
  - comment:
      start: "//"
      end: "$"

  - comment:
      start: "/\\*"
      end: "\\*/"

  - constant.string:
      start: "`"
      end: "`"

  - constant.string:
      start: "'"
      end: "'"
      skip: "\\\\."

  - constant.string:
      start: "\""
      end: "\""
      skip: "\\\\."

  - keyword: "(fn|mut|pub|return|unsafe|defer|match|select|lock|as|atomic|go|spawn|or)"
  - keyword: "(struct|enum|interface|type|union|const|__global)"
  - keyword: "(module|import)"
  - keyword: "(if|else|for|break|continue|goto)"
  - keyword: "(true|false|none|nil)"
  - constant.number: "(0x[0-9a-fA-F_]+|0b[01_]+|0o[0-7_]+|[0-9][0-9_]*)"
  - symbol.brackets: "(\\{|\\}|\\(|\\)|\\[|\\])"
